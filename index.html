<!DOCTYPE html>
<html lang="en">
<head>
    <title>Justin Mulvey Photography Collections</title>

    <link rel="icon" type="image/png" href="data/favicon.png">

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <style>
        html,
        body {
            min-height: 100%;
            margin: 0;
            background: black;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        a {
            color: inherit;
        }

        #topLeftLogo {
            position: fixed;
            top: 15px;
            left: 20px;
            z-index: 50;
            display: block;
            height: 87px;
            text-decoration: none;
        }

        #topLeftLogo img {
            display: block;
            width: auto;
            height: 100%;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
            transition:
                opacity 0.2s ease,
                transform 0.25s ease;
        }

        #topLeftLogo:hover img {
            opacity: 0.75;
            transform: scale(1.025);
        }

        #topLeftLogo:focus-visible {
            outline: 1px solid white;
            outline-offset: 5px;
        }

        #version {
            position: fixed;
            top: 107px;
            left: 20px;
            z-index: 50;
            color: red;
            font-size: 12px;
            line-height: 1;
            opacity: 0.85;
        }

        nav {
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        nav a {
            color: white;
            font-size: 22.4px;
            line-height: 1.1;
            text-decoration: none;
            transition:
                opacity 0.2s ease,
                transform 0.2s ease;
        }

        nav a:hover {
            opacity: 0.65;
            transform: translateX(-3px);
        }

        nav a:focus-visible {
            outline: 1px solid white;
            outline-offset: 5px;
            border-radius: 2px;
        }

        #page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 140px 28px 80px;
            text-align: center;
        }

        #hero {
            max-width: 980px;
        }

        h1 {
            margin: 0;
            font-size: clamp(44px, 8vw, 102px);
            font-weight: 500;
            line-height: 0.96;
            letter-spacing: -0.055em;
        }

        #heroLinks {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 42px;
        }

        .hero-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 150px;
            padding: 13px 20px;
            color: white;
            border: 1px solid white;
            border-radius: 999px;
            text-decoration: none;
            font-size: 15px;
            letter-spacing: 0.04em;
            transition:
                color 0.22s ease,
                background-color 0.22s ease,
                transform 0.22s ease;
        }

        .hero-button:hover {
            color: black;
            background: white;
            transform: translateY(-2px);
        }

        .hero-button:focus-visible {
            outline: 1px solid white;
            outline-offset: 5px;
        }

        @media (max-width: 820px) {
            #topLeftLogo {
                height: 70px;
            }

            #version {
                top: 90px;
            }

            #page {
                padding-top: 155px;
            }

            #hero {
                max-width: 720px;
            }
        }

        @media (max-width: 520px) {
            #topLeftLogo {
                top: 14px;
                left: 14px;
                height: 56px;
            }

            #version {
                top: 75px;
                left: 14px;
            }

            nav {
                right: 14px;
            }

            nav a {
                font-size: 18px;
            }

            #page {
                padding-top: 145px;
            }

            h1 {
                font-size: clamp(40px, 12vw, 58px);
            }

            .hero-button {
                width: 100%;
                max-width: 260px;
            }
        }
    </style>
</head>

<body>
    <a
        id="topLeftLogo"
        href="index.html"
        aria-label="JM Photography home"
    >
        <img
            src="data/logo.png"
            alt="JM Photography"
        >
    </a>

    <div id="version">v1.0.2</div>

    <nav aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="collections.html">Collections</a>
        <a href="about.html">About</a>
    </nav>

    <main id="page">
        <section id="hero">
            <h1>Justin Mulvey Photography Collections</h1>

            <div id="heroLinks">
                <a
                    class="hero-button"
                    href="collections.html"
                >
                    View Collections
                </a>

                <a
                    class="hero-button"
                    href="about.html"
                >
                    About
                </a>
            </div>
        </section>
    </main>
</body>
</html>
