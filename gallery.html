<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        nav {
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 30;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        #controlArea {
            position: fixed;
            top: 15px;
            left: 20px;
            z-index: 30;
            width: 40px;
            height: 280px;
        }

        .control-button {
            position: absolute;
            top: 0;
            left: 0;
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid white;
            cursor: pointer;
            font-size: 16px;
            text-align: center;
            transition:
                transform 0.3s ease,
                opacity 0.2s ease;
        }

        #collapseControls {
            transform: translateY(0);
            z-index: 6;
        }

        #fullscreen {
            transform: translateY(48px);
            z-index: 5;
        }

        #hideUI {
            transform: translateY(96px);
            z-index: 4;
        }

        #zoomIn {
            transform: translateY(144px);
            z-index: 3;
        }

        #zoomOut {
            transform: translateY(192px);
            z-index: 2;
        }

        #controls.collapsed #fullscreen,
        #controls.collapsed #hideUI,
        #controls.collapsed #zoomIn,
        #controls.collapsed #zoomOut {
            transform: translateY(0);
            opacity: 0;
            pointer-events: none;
        }

        #collapseControls {
            transition:
                transform 0.3s ease,
                opacity 0.2s ease;
        }

        #controls.collapsed #collapseControls {
            opacity: 0;
            pointer-events: none;
        }

        #expandControls {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 7;
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid white;
            cursor: pointer;
            font-size: 16px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        #expandControls.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #version {
            position: absolute;
            top: 240px;
            left: 0;
            width: 40px;
            color: red;
            font-size: 12px;
            text-align: center;
            opacity: 0.8;
            transition:
                transform 0.3s ease,
                opacity 0.2s ease;
        }

        #version.collapsed {
            transform: translateY(-240px);
            opacity: 0;
        }

        #viewer {
            width: 100vw;
            height: calc(100vh - 100px);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #photo {
            max-width: 95vw;
            max-height: 85vh;
            object-fit: contain;
            opacity: 1;
            transition: opacity 0.35s ease;
            transform-origin: center center;
            user-select: none;
            -webkit-user-drag: none;
            cursor: default;
        }

        #photo.zoomed {
            cursor: grab;
        }

        #photo.dragging {
            cursor: grabbing;
        }

        #counter {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            z-index: 25;
        }

        #thumbnails {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.75);
            overflow-x: auto;
            padding: 5px;
            box-sizing: border-box;
        }

        .thumb {
            height: 70px;
            width: auto;
            flex-shrink: 0;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .thumb:hover {
            opacity: 0.8;
        }

        .thumb.active {
            opacity: 1;
        }

        body.ui-hidden #controlArea,
        body.ui-hidden nav,
        body.ui-hidden #counter,
        body.ui-hidden #thumbnails {
            display: none !important;
        }

        body.ui-hidden #viewer {
            height: 100vh;
        }

        body.ui-hidden #photo {
            max-width: 100vw;
            max-height: 100vh;
        }
    </style>
</head>

<body>
    <div id="controlArea">
        <div id="controls">
            <button
                id="collapseControls"
                class="control-button"
                aria-label="Collapse controls"
            >&lt;</button>

            <button
                id="fullscreen"
                class="control-button"
                aria-label="Toggle fullscreen"
            >F</button>

            <button
                id="hideUI"
                class="control-button"
                aria-label="Hide interface"
            >H</button>

            <button
                id="zoomIn"
                class="control-button"
                aria-label="Zoom in"
            >+</button>

            <button
                id="zoomOut"
                class="control-button"
                aria-label="Zoom out"
            >−</button>
        </div>

        <button id="expandControls" aria-label="Expand controls">&gt;</button>

        <div id="version"></div>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="collections.html">Collections</a>
    </nav>

    <div id="viewer">
        <img id="photo" alt="">
    </div>

    <div id="counter"></div>
    <div id="thumbnails"></div>

    <script>
        const version = "v1.3.10";
        document.getElementById("version").textContent = version;

        const base =
            "https://filedn.com/lbA2Vsf4s7Fj5KoVfXs5UL4/JM_Photos/";

        const params = new URLSearchParams(window.location.search);
        const collection = params.get("collection");

        const photo = document.getElementById("photo");
        const viewer = document.getElementById("viewer");
        const controls = document.getElementById("controls");
        const expandControls =
            document.getElementById("expandControls");
        const versionElement =
            document.getElementById("version");

        let images = [];
        let thumbnails = [];
        let current = 0;

        let zoomLevel = 1;
        let panX = 0;
        let panY = 0;

        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let startingPanX = 0;
        let startingPanY = 0;

        let controlsCollapsed = false;

        const minimumZoom = 1;
        const maximumZoom = 4;
        const zoomStep = 0.5;

        fetch("collections.json")
            .then(response => {
                if (!response.ok) {
                    throw new Error(
                        `Unable to load collections.json: ${response.status}`
                    );
                }

                return response.json();
            })
            .then(data => {
                const selected = data.find(
                    item => item.name === collection
                );

                if (!selected) {
                    document.getElementById("counter").textContent =
                        "Collection not found";
                    return;
                }

                for (let i = 1; i <= selected.images; i++) {
                    images.push(
                        `${base}${selected.name}/originals/${i}.jpg`
                    );

                    thumbnails.push(
                        `${base}${selected.name}/thumbnails/${i}.jpg`
                    );
                }

                createThumbnails();
                showImage();
            })
            .catch(error => {
                document.getElementById("counter").textContent =
                    "Error loading collection";

                console.error(error);
            });

        function showImage() {
            if (images.length === 0) {
                return;
            }

            const newImage = new Image();

            resetZoom();
            photo.style.opacity = 0;

            newImage.onload = function () {
                photo.src = newImage.src;
                photo.style.opacity = 1;
            };

            newImage.onerror = function () {
                photo.style.opacity = 1;

                console.error(
                    `Unable to load image: ${images[current]}`
                );
            };

            newImage.src = images[current];

            updateCounter();
            updateThumbnails();
            preloadNearbyImages();
        }

        function preloadNearbyImages() {
            const indexes = [
                (current - 1 + images.length) % images.length,
                (current + 1) % images.length
            ];

            indexes.forEach(index => {
                const image = new Image();
                image.src = images[index];
            });
        }

        function createThumbnails() {
            const container =
                document.getElementById("thumbnails");

            container.innerHTML = "";

            thumbnails.forEach((src, index) => {
                const thumbnail =
                    document.createElement("img");

                thumbnail.src = src;
                thumbnail.loading = "lazy";
                thumbnail.className = "thumb";
                thumbnail.alt = `Photo ${index + 1}`;

                thumbnail.addEventListener("click", function () {
                    current = index;
                    showImage();
                });

                container.appendChild(thumbnail);
            });
        }

        function updateThumbnails() {
            const thumbnailElements =
                document.querySelectorAll(".thumb");

            thumbnailElements.forEach((thumbnail, index) => {
                if (index === current) {
                    thumbnail.classList.add("active");

                    thumbnail.scrollIntoView({
                        behavior: "smooth",
                        inline: "center",
                        block: "nearest"
                    });
                } else {
                    thumbnail.classList.remove("active");
                }
            });
        }

        function updateCounter() {
            document.getElementById("counter").textContent =
                `${current + 1} / ${images.length}`;
        }

        function nextImage() {
            if (images.length === 0) {
                return;
            }

            current = (current + 1) % images.length;
            showImage();
        }

        function previousImage() {
            if (images.length === 0) {
                return;
            }

            current =
                (current - 1 + images.length) % images.length;

            showImage();
        }

        function updateZoom() {
            photo.style.transform =
                `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;

            photo.classList.toggle("zoomed", zoomLevel > 1);
        }

        function zoomIn() {
            zoomLevel = Math.min(
                maximumZoom,
                zoomLevel + zoomStep
            );

            updateZoom();
        }

        function zoomOut() {
            zoomLevel = Math.max(
                minimumZoom,
                zoomLevel - zoomStep
            );

            if (zoomLevel === minimumZoom) {
                panX = 0;
                panY = 0;
            }

            updateZoom();
        }

        function resetZoom() {
            zoomLevel = minimumZoom;
            panX = 0;
            panY = 0;
            isDragging = false;

            photo.classList.remove("dragging");
            updateZoom();
        }

        function doubleClickZoom(event) {
            if (zoomLevel > minimumZoom) {
                resetZoom();
                return;
            }

            const viewerRect =
                viewer.getBoundingClientRect();

            const viewerCenterX =
                viewerRect.left + viewerRect.width / 2;

            const viewerCenterY =
                viewerRect.top + viewerRect.height / 2;

            const clickOffsetX =
                event.clientX - viewerCenterX;

            const clickOffsetY =
                event.clientY - viewerCenterY;

            zoomLevel = Math.min(
                maximumZoom,
                minimumZoom + zoomStep * 3
            );

            panX =
                -clickOffsetX * (zoomLevel - minimumZoom);

            panY =
                -clickOffsetY * (zoomLevel - minimumZoom);

            updateZoom();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement
                    .requestFullscreen()
                    .catch(error => {
                        console.error(
                            "Unable to enter fullscreen:",
                            error
                        );
                    });
            } else {
                document.exitFullscreen();
            }
        }

        function collapseMediaControls() {
            controlsCollapsed = true;
            controls.classList.add("collapsed");
            versionElement.classList.add("collapsed");

            window.setTimeout(function () {
                expandControls.classList.add("visible");
            }, 220);
        }

        function expandMediaControls() {
            controlsCollapsed = false;
            expandControls.classList.remove("visible");

            window.setTimeout(function () {
                controls.classList.remove("collapsed");
                versionElement.classList.remove("collapsed");
            }, 80);
        }

        function showUI() {
            document.body.classList.remove("ui-hidden");

            if (controlsCollapsed) {
                controls.classList.add("collapsed");
                versionElement.classList.add("collapsed");
                expandControls.classList.add("visible");
            } else {
                controls.classList.remove("collapsed");
                versionElement.classList.remove("collapsed");
                expandControls.classList.remove("visible");
            }
        }

        async function enterHideMode() {
            if (!document.fullscreenElement) {
                try {
                    await document.documentElement.requestFullscreen();
                } catch (error) {
                    console.error(
                        "Unable to enter fullscreen:",
                        error
                    );
                }
            }

            document.body.classList.add("ui-hidden");
        }

        function toggleUI() {
            if (document.body.classList.contains("ui-hidden")) {
                showUI();
            } else {
                enterHideMode();
            }
        }

        document.getElementById("zoomIn")
            .addEventListener("click", zoomIn);

        document.getElementById("zoomOut")
            .addEventListener("click", zoomOut);

        document.getElementById("fullscreen")
            .addEventListener("click", toggleFullscreen);

        document.getElementById("hideUI")
            .addEventListener("click", toggleUI);

        document.getElementById("collapseControls")
            .addEventListener("click", collapseMediaControls);

        expandControls.addEventListener(
            "click",
            expandMediaControls
        );

        photo.addEventListener("dblclick", function (event) {
            event.preventDefault();
            doubleClickZoom(event);
        });

        photo.addEventListener("mousedown", function (event) {
            if (zoomLevel <= minimumZoom) {
                return;
            }

            event.preventDefault();

            isDragging = true;
            dragStartX = event.clientX;
            dragStartY = event.clientY;
            startingPanX = panX;
            startingPanY = panY;

            photo.classList.add("dragging");
        });

        document.addEventListener("mousemove", function (event) {
            if (!isDragging) {
                return;
            }

            panX =
                startingPanX + event.clientX - dragStartX;

            panY =
                startingPanY + event.clientY - dragStartY;

            updateZoom();
        });

        document.addEventListener("mouseup", function () {
            isDragging = false;
            photo.classList.remove("dragging");
        });

        document.addEventListener("fullscreenchange", function () {
            if (!document.fullscreenElement) {
                showUI();
            }
        });

        document.addEventListener("keydown", function (event) {
            if (event.repeat) {
                return;
            }

            const key = event.key.toLowerCase();

            if (key === "arrowright") {
                nextImage();
            }

            if (key === "arrowleft") {
                previousImage();
            }

            if (key === "+" || key === "=") {
                zoomIn();
            }

            if (key === "-") {
                zoomOut();
            }

            if (key === "f") {
                toggleFullscreen();
            }

            if (key === "h") {
                toggleUI();
            }

            if (key === "escape") {
                showUI();

                if (document.fullscreenElement) {
                    document.exitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
