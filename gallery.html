<!DOCTYPE html>
<html>

<head>
<title>Gallery</title>

<style>

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
}


nav {
    position: fixed;
    top: 15px;
    right: 20px;
    z-index: 30;
}


nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
}


#fullscreen {
    position: fixed;
    top: 15px;
    left: 20px;

    z-index: 30;

    background: rgba(0,0,0,0.5);

    color: white;

    border: 1px solid white;

    padding: 8px 12px;

    cursor: pointer;
}



#version {

    position: fixed;

    top: 55px;

    left: 20px;

    z-index: 30;

    color: red;

    font-size: 12px;

    opacity: 0.8;

}



#viewer {

    width: 100vw;

    height: calc(100vh - 100px);

    display: flex;

    justify-content: center;

    align-items: center;

}



#photo {

    max-width: 95vw;

    max-height: 85vh;

    object-fit: contain;

    opacity: 1;

    transition: opacity 0.35s ease;

}



#left,
#right {

    position: fixed;

    top: 0;

    width: 50%;

    height: 100%;

    z-index: 5;

}


#left {

    left: 0;

}


#right {

    right: 0;

}





#counter {

    position: fixed;

    bottom: 75px;

    left: 50%;

    transform: translateX(-50%);

    color: white;

    z-index: 25;

}







#thumbnails {

    position: fixed;

    bottom: 0;

    left: 0;

    width: 100%;

    height: 80px;

    z-index: 20;


    display: flex;

    align-items: center;


    justify-content: center;


    gap: 8px;


    background: rgba(0,0,0,0.75);


    overflow-x: auto;


    padding: 5px;


    box-sizing: border-box;

}





.thumb {

    height: 70px;

    width: auto;

    flex-shrink: 0;

    cursor: pointer;

    opacity: 0.5;

    transition: opacity 0.2s;

}



.thumb:hover {

    opacity: 0.8;

}



.thumb.active {

    opacity: 1;

}



</style>

</head>



<body>


<button id="fullscreen">
Fullscreen
</button>



<div id="version"></div>



<nav>
<a href="index.html">Home</a>
<a href="collections.html">Collections</a>
</nav>



<div id="viewer">

<img id="photo">

</div>



<div id="left"></div>

<div id="right"></div>



<div id="counter"></div>



<div id="thumbnails"></div>





<script>


// ==========================
// Version
// ==========================

const version = "v1.3";

document.getElementById("version").innerHTML = version;




// ==========================
// Settings
// ==========================

const base =
"https://filedn.com/lbA2Vsf4s7Fj5KoVfXs5UL4/JM_Photos/";



const params =
new URLSearchParams(window.location.search);



const collection =
params.get("collection");



let images = [];

let thumbnails = [];

let current = 0;





// ==========================
// Load collection
// ==========================

fetch("collections.json")

.then(response => response.json())

.then(data => {


const selected =
data.find(x => x.name === collection);



if(!selected){

    document.getElementById("counter").innerHTML =
    "Collection not found";

    return;

}



for(let i = 1; i <= selected.images; i++){


    images.push(
        `${base}${selected.name}/originals/${i}.jpg`
    );


    thumbnails.push(
        `${base}${selected.name}/thumbnails/${i}.jpg`
    );


}



createThumbnails();

showImage();



});






// ==========================
// Display image
// ==========================

function showImage(){


const photo =
document.getElementById("photo");



photo.style.opacity = 0;



const newImage = new Image();



newImage.onload = function(){


    photo.src = newImage.src;

    photo.style.opacity = 1;


};



newImage.src =
images[current];



updateCounter();

updateThumbnails();

preloadNext();



}





function preloadNext(){


[
current + 1,
current - 1

].forEach(index => {


if(index >= 0 && index < images.length){


    const img = new Image();

    img.src = images[index];


}


});


}





// ==========================
// Thumbnails
// ==========================

function createThumbnails(){


const container =
document.getElementById("thumbnails");



thumbnails.forEach((src,index)=>{


const img =
document.createElement("img");



img.src = src;

img.loading = "lazy";

img.className = "thumb";



img.onclick = function(event){


    event.stopPropagation();

    current = index;

    showImage();


};



container.appendChild(img);



});


}






function updateThumbnails(){


const thumbs =
document.querySelectorAll(".thumb");



thumbs.forEach((thumb,index)=>{


if(index === current){


    thumb.classList.add("active");


    thumb.scrollIntoView({

        behavior: "smooth",

        inline: "center",

        block: "nearest"

    });


}

else{


    thumb.classList.remove("active");


}



});


}







function updateCounter(){


document.getElementById("counter").innerHTML =
`${current+1} / ${images.length}`;


}






// ==========================
// Navigation
// ==========================

function nextImage(){


current++;


if(current >= images.length){

    current = 0;

}


showImage();


}





function previousImage(){


current--;


if(current < 0){

    current = images.length - 1;

}


showImage();


}





document.getElementById("left")
.onclick =
previousImage;



document.getElementById("right")
.onclick =
nextImage;






// Keyboard

document.addEventListener(
"keydown",
function(event){


if(event.key === "ArrowRight"){

    nextImage();

}


if(event.key === "ArrowLeft"){

    previousImage();

}


});







// ==========================
// Swipe
// ==========================

let touchStartX = 0;



document.addEventListener(
"touchstart",
function(event){


touchStartX =
event.changedTouches[0].screenX;


});



document.addEventListener(
"touchend",
function(event){


let touchEndX =
event.changedTouches[0].screenX;



if(touchEndX < touchStartX - 50){

    nextImage();

}



if(touchEndX > touchStartX + 50){

    previousImage();

}



});







// ==========================
// Fullscreen
// ==========================

document.getElementById("fullscreen")
.onclick = function(){


if(!document.fullscreenElement){

    document.documentElement.requestFullscreen();

}

else{

    document.exitFullscreen();

}


};



</script>


</body>

</html>
