<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        nav {
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 30;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        #fullscreen {
            position: fixed;
            top: 15px;
            left: 20px;
            z-index: 30;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid white;
            padding: 8px 12px;
            cursor: pointer;
        }

        #version {
            position: fixed;
            top: 55px;
            left: 20px;
            z-index: 30;
            color: red;
            font-size: 12px;
            opacity: 0.8;
        }

        #viewer {
            width: 100vw;
            height: calc(100vh - 100px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #photo {
            max-width: 95vw;
            max-height: 85vh;
            object-fit: contain;
            opacity: 1;
            transition: opacity 0.35s ease;
        }

        #left,
        #right {
            position: fixed;
            top: 0;
            width: 50%;
            height: 100%;
            z-index: 5;
        }

        #left {
            left: 0;
        }

        #right {
            right: 0;
        }

        #counter {
            position: fixed;
            bottom: 75px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            z-index: 25;
        }

        #thumbnails {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.75);
            overflow-x: auto;
            padding: 5px;
            box-sizing: border-box;
        }

        .thumb {
            height: 70px;
            width: auto;
            flex-shrink: 0;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .thumb:hover {
            opacity: 0.8;
        }

        .thumb.active {
            opacity: 1;
        }
    </style>
</head>

<body>
    <button id="fullscreen">Fullscreen</button>

    <div id="version"></div>

    <nav>
        <a href="index.html">Home</a>
        <a href="collections.html">Collections</a>
    </nav>

    <div id="viewer">
        <img id="photo" alt="">
    </div>

    <div id="left"></div>
    <div id="right"></div>

    <div id="counter"></div>
    <div id="thumbnails"></div>

    <script>
        const version = "v1.3.1";
        document.getElementById("version").textContent = version;

        const base =
            "https://filedn.com/lbA2Vsf4s7Fj5KoVfXs5UL4/JM_Photos/";

        const params = new URLSearchParams(window.location.search);
        const collection = params.get("collection");

        let images = [];
        let thumbnails = [];
        let current = 0;

        fetch("collections.json")
            .then(response => {
                if (!response.ok) {
                    throw new Error(
                        `Unable to load collections.json: ${response.status}`
                    );
                }

                return response.json();
            })
            .then(data => {
                const selected = data.find(
                    item => item.name === collection
                );

                if (!selected) {
                    document.getElementById("counter").textContent =
                        "Collection not found";
                    return;
                }

                for (let i = 1; i <= selected.images; i++) {
                    images.push(
                        `${base}${selected.name}/originals/${i}.jpg`
                    );

                    thumbnails.push(
                        `${base}${selected.name}/thumbnails/${i}.jpg`
                    );
                }

                createThumbnails();
                showImage();
            })
            .catch(error => {
                document.getElementById("counter").textContent =
                    "Error loading collection";

                console.error(error);
            });

        function showImage() {
            if (images.length === 0) {
                return;
            }

            const photo = document.getElementById("photo");
            const newImage = new Image();

            photo.style.opacity = 0;

            newImage.onload = function () {
                photo.src = newImage.src;
                photo.style.opacity = 1;
            };

            newImage.onerror = function () {
                photo.style.opacity = 1;
                console.error(`Unable to load image: ${images[current]}`);
            };

            newImage.src = images[current];

            updateCounter();
            updateThumbnails();
            preloadNearbyImages();
        }

        function preloadNearbyImages() {
            const indexes = [
                (current - 1 + images.length) % images.length,
                (current + 1) % images.length
            ];

            indexes.forEach(index => {
                const image = new Image();
                image.src = images[index];
            });
        }

        function createThumbnails() {
            const container = document.getElementById("thumbnails");
            container.innerHTML = "";

            thumbnails.forEach((src, index) => {
                const thumbnail = document.createElement("img");

                thumbnail.src = src;
                thumbnail.loading = "lazy";
                thumbnail.className = "thumb";
                thumbnail.alt = `Photo ${index + 1}`;

                thumbnail.addEventListener("click", function (event) {
                    event.stopPropagation();
                    current = index;
                    showImage();
                });

                container.appendChild(thumbnail);
            });
        }

        function updateThumbnails() {
            const thumbnailElements =
                document.querySelectorAll(".thumb");

            thumbnailElements.forEach((thumbnail, index) => {
                if (index === current) {
                    thumbnail.classList.add("active");

                    thumbnail.scrollIntoView({
                        behavior: "smooth",
                        inline: "center",
                        block: "nearest"
                    });
                } else {
                    thumbnail.classList.remove("active");
                }
            });
        }

        function updateCounter() {
            document.getElementById("counter").textContent =
                `${current + 1} / ${images.length}`;
        }

        function nextImage() {
            if (images.length === 0) {
                return;
            }

            current = (current + 1) % images.length;
            showImage();
        }

        function previousImage() {
            if (images.length === 0) {
                return;
            }

            current =
                (current - 1 + images.length) % images.length;

            showImage();
        }

        document.getElementById("left")
            .addEventListener("click", previousImage);

        document.getElementById("right")
            .addEventListener("click", nextImage);

        document.addEventListener("keydown", function (event) {
            if (event.key === "ArrowRight") {
                nextImage();
            }

            if (event.key === "ArrowLeft") {
                previousImage();
            }
        });

        let touchStartX = 0;

        document.addEventListener("touchstart", function (event) {
            touchStartX =
                event.changedTouches[0].screenX;
        });

        document.addEventListener("touchend", function (event) {
            const touchEndX =
                event.changedTouches[0].screenX;

            if (touchEndX < touchStartX - 50) {
                nextImage();
            }

            if (touchEndX > touchStartX + 50) {
                previousImage();
            }
        });

        document.getElementById("fullscreen")
            .addEventListener("click", function () {
                if (!document.fullscreenElement) {
                    document.documentElement
                        .requestFullscreen()
                        .catch(error => {
                            console.error(
                                "Unable to enter fullscreen:",
                                error
                            );
                        });
                } else {
                    document.exitFullscreen();
                }
            });
    </script>
</body>
</html>
