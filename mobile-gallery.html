<!DOCTYPE html>
<html lang="en">
<head>
    <title>Gallery</title>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >
    <meta name="theme-color" content="#000000">

    <link rel="icon" type="image/png" href="data/favicon.png">
    <link rel="stylesheet" href="mobile-gallery.css?v=2.4.7">
</head>

<body>
    <div id="mobileTopSpacer">
        <span id="mobileVersion">v2.4.7</span>
    </div>
    <a
        id="mobileBack"
        href="collections.html"
        aria-label="Back to collections"
    >
        <span aria-hidden="true">‹</span>
    </a>

    <button
        id="mobileLandscape"
        type="button"
        aria-label="Rotate to landscape"
        aria-pressed="false"
        hidden
    >
        Rotate
    </button>

    <button
        id="mobileFullscreen"
        type="button"
        aria-label="Enter fullscreen"
        aria-pressed="false"
    >
        Full Screen
    </button>

    <button
        id="mobileMenu"
        type="button"
        aria-label="Menu"
        aria-expanded="false"
        aria-controls="mobileMenuPanel"
    >
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
    </button>

    <div
        id="mobileMenuPanel"
        hidden
        role="menu"
        aria-label="Gallery options"
    >
        <button
            id="mobileExitFullscreen"
            type="button"
            role="menuitem"
            disabled
        >
            Exit Full Screen
        </button>

        <button
            id="mobileFullResolution"
            type="button"
            role="menuitem"
        >
            Enable Full Resolution Image
        </button>

        <button
            id="mobileDownloadPhoto"
            type="button"
            role="menuitem"
        >
            Download Photo
        </button>
    </div>

    <main id="mobileGallery" aria-live="polite">
        <div
            id="mobileGrid"
            aria-label="Photograph grid"
            aria-busy="true"
        ></div>

        <p id="mobileStatus" role="status"></p>

        <div
            id="mobileBottomSpacer"
            aria-hidden="true"
        ></div>
    </main>


    <div
        id="mobileDownloadToast"
        hidden
        role="status"
        aria-live="polite"
    ></div>

    <div
        id="mobileViewer"
        hidden
        aria-hidden="true"
        role="dialog"
        aria-modal="true"
        aria-label="Photograph viewer"
    >
        <div id="mobileViewerStage">
            <img
                id="mobileViewerImage"
                class="mobile-viewer-photo"
                alt=""
            >
            <img
                id="mobileViewerPreview"
                class="mobile-viewer-photo preview"
                alt=""
                aria-hidden="true"
            >
        </div>

        <div
            id="mobileBoundaryToast"
            role="status"
            aria-live="polite"
            aria-atomic="true"
        ></div>
    </div>

    <script src="mobile-gallery.js?v=2.4.7" defer></script>
</body>
</html>
