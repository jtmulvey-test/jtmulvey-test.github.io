<!DOCTYPE html>
<html lang="en">
<head>
    <title>Collections | JM Photography</title>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <style>
        :root {
            --page-background: #000000;
            --card-background: #0b0b0b;
            --card-background-hover: #101010;
            --primary-text: #ffffff;
            --secondary-text: rgba(255, 255, 255, 0.62);
            --subtle-border: rgba(255, 255, 255, 0.12);
            --strong-border: rgba(255, 255, 255, 0.28);
            --card-radius: 16px;
            --page-width: 1260px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: var(--page-background);
        }

        body {
            min-height: 100%;
            margin: 0;
            color: var(--primary-text);
            background: var(--page-background);
            font-family:
                Arial,
                Helvetica,
                sans-serif;
        }

        a {
            color: inherit;
        }

        #topLeftLogo {
            position: fixed;
            top: 15px;
            left: 20px;
            z-index: 50;
            display: block;
            width: 175px;
            text-decoration: none;
        }

        #topLeftLogo img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
            transition:
                opacity 0.2s ease,
                transform 0.25s ease;
        }

        #topLeftLogo:hover img {
            opacity: 0.75;
            transform: scale(1.025);
        }

        #topLeftLogo:focus-visible {
            outline: 1px solid white;
            outline-offset: 5px;
        }

        #version {
            position: fixed;
            top: 102px;
            left: 20px;
            z-index: 50;
            color: red;
            font-size: 12px;
            line-height: 1;
            opacity: 0.85;
        }

        nav {
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        nav a {
            color: white;
            font-size: 22.4px;
            line-height: 1.1;
            text-decoration: none;
            transition:
                opacity 0.2s ease,
                transform 0.2s ease;
        }

        nav a:hover {
            opacity: 0.65;
            transform: translateX(-3px);
        }

        nav a:focus-visible {
            outline: 1px solid white;
            outline-offset: 5px;
            border-radius: 2px;
        }

        #page {
            width: min(
                var(--page-width),
                calc(100% - 64px)
            );
            margin: 0 auto;
            padding: 110px 0 70px;
        }

        #pageHeader {
            margin: 0 auto 48px;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: clamp(42px, 7vw, 82px);
            font-weight: 500;
            line-height: 0.95;
            letter-spacing: -0.045em;
        }

        #collectionSummary {
            min-height: 20px;
            margin: 0 0 20px;
            color: var(--secondary-text);
            font-size: 13px;
            letter-spacing: 0.04em;
        }

        #collectionsGrid {
            display: grid;
            grid-template-columns: repeat(
                4,
                minmax(0, 1fr)
            );
            gap: 32px;
        }

        .collection-card {
            position: relative;
            min-width: 0;
            overflow: hidden;
            color: var(--primary-text);
            background: var(--card-background);
            border: 1px solid var(--subtle-border);
            border-radius: var(--card-radius);
            text-decoration: none;
            isolation: isolate;
            transition:
                transform 0.3s ease,
                border-color 0.3s ease,
                background-color 0.3s ease,
                box-shadow 0.3s ease;
        }

        .collection-card:hover {
            z-index: 2;
            background: var(--card-background-hover);
            border-color: var(--strong-border);
            transform: translateY(-7px);
            box-shadow:
                0 22px 55px rgba(0, 0, 0, 0.55),
                0 0 0 1px rgba(255, 255, 255, 0.04);
        }

        .collection-card:focus-visible {
            outline: 2px solid white;
            outline-offset: 5px;
        }

        .image-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            background:
                linear-gradient(
                    115deg,
                    #0d0d0d 25%,
                    #191919 45%,
                    #0d0d0d 65%
                );
            background-size: 220% 100%;
        }

        .collection-image {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transform: scale(1.01);
            transition:
                opacity 0.45s ease,
                transform 0.65s ease;
        }

        .collection-image.loaded {
            opacity: 1;
        }

        .collection-card:hover .collection-image {
            transform: scale(1.055);
        }

        .image-shade {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(
                    to top,
                    rgba(0, 0, 0, 0.62),
                    transparent 42%
                );
            opacity: 0.85;
            transition: opacity 0.3s ease;
        }

        .collection-card:hover .image-shade {
            opacity: 0.55;
        }

        .image-count {
            position: absolute;
            top: 14px;
            right: 14px;
            padding: 7px 10px;
            color: white;
            background: rgba(0, 0, 0, 0.58);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 999px;
            font-size: 12px;
            line-height: 1;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .collection-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            min-height: 86px;
            padding: 19px 20px 20px;
        }

        .collection-text {
            min-width: 0;
        }

        .collection-title {
            margin: 0;
            overflow: hidden;
            font-size: 18px;
            font-weight: 500;
            line-height: 1.25;
            letter-spacing: -0.015em;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .collection-subtitle {
            margin: 7px 0 0;
            color: var(--secondary-text);
            font-size: 12px;
            line-height: 1.3;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .card-arrow {
            display: flex;
            width: 38px;
            height: 38px;
            flex: 0 0 auto;
            align-items: center;
            justify-content: center;
            color: white;
            background: transparent;
            border: 1px solid white;
            border-radius: 50%;
            font-size: 19px;
            line-height: 1;
            transform: translate(1px, -1px);
            transition:
                color 0.3s ease,
                transform 0.3s ease,
                background-color 0.3s ease,
                border-color 0.3s ease;
        }

        .collection-card:hover .card-arrow {
            color: black;
            background: white;
            border-color: white;
            transform: translate(4px, -1px);
        }

        #status {
            padding: 70px 20px;
            color: var(--secondary-text);
            text-align: center;
            font-size: 16px;
        }

        #status.error {
            color: #ff6b6b;
        }

        .skeleton-card {
            overflow: hidden;
            background: var(--card-background);
            border: 1px solid var(--subtle-border);
            border-radius: var(--card-radius);
        }

        .skeleton-image,
        .skeleton-line {
            background:
                linear-gradient(
                    110deg,
                    #0d0d0d 25%,
                    #1b1b1b 42%,
                    #0d0d0d 60%
                );
            background-size: 220% 100%;
            animation: skeletonLoading 1.5s linear infinite;
        }

        .skeleton-image {
            aspect-ratio: 1 / 1;
        }

        .skeleton-content {
            height: 86px;
            padding: 22px 20px;
        }

        .skeleton-line {
            width: 68%;
            height: 13px;
            border-radius: 999px;
        }

        .skeleton-line.small {
            width: 42%;
            height: 9px;
            margin-top: 12px;
        }

        @keyframes skeletonLoading {
            from {
                background-position: 100% 0;
            }

            to {
                background-position: -100% 0;
            }
        }

        @media (max-width: 1120px) {
            #collectionsGrid {
                grid-template-columns: repeat(
                    3,
                    minmax(0, 1fr)
                );
                gap: 28px;
            }
        }

        @media (max-width: 820px) {
            #topLeftLogo {
                width: 145px;
            }

            #version {
                top: 88px;
            }

            #page {
                width: min(100% - 32px, 680px);
                padding-top: 150px;
            }

            #pageHeader {
                margin-bottom: 42px;
            }

            #collectionsGrid {
                grid-template-columns: repeat(
                    2,
                    minmax(0, 1fr)
                );
                gap: 20px;
            }

            .collection-content {
                min-height: 78px;
                padding: 16px;
            }

            .collection-title {
                font-size: 16px;
            }

            .card-arrow {
                width: 35px;
                height: 35px;
                font-size: 18px;
            }
        }

        @media (max-width: 520px) {
            #topLeftLogo {
                top: 14px;
                left: 14px;
                width: 120px;
            }

            #version {
                top: 76px;
                left: 14px;
            }

            nav {
                right: 14px;
            }

            nav a {
                font-size: 18px;
            }

            #page {
                width: calc(100% - 28px);
                padding-top: 150px;
            }

            h1 {
                font-size: 42px;
            }

            #collectionsGrid {
                grid-template-columns: 1fr;
                gap: 22px;
            }

            .collection-card {
                border-radius: 14px;
            }

            .image-container {
                aspect-ratio: 4 / 3;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <a
        id="topLeftLogo"
        href="index.html"
        aria-label="JM Photography home"
    >
        <img
            src="logo.png"
            alt="JM Photography"
        >
    </a>

    <div id="version">v1.1.6</div>

    <nav aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="collections.html">Collections</a>
        <a href="about.html">About</a>
    </nav>

    <main id="page">
        <header id="pageHeader">
            <h1>Collections</h1>
        </header>

        <div
            id="collectionSummary"
            aria-live="polite"
        ></div>

        <div
            id="collectionsGrid"
            aria-live="polite"
            aria-busy="true"
        ></div>

        <div id="status" role="status">
            Loading collections...
        </div>
    </main>

    <script>
        const grid =
            document.getElementById("collectionsGrid");

        const status =
            document.getElementById("status");

        const collectionSummary =
            document.getElementById("collectionSummary");

        function createSkeletonCards(numberOfCards = 8) {
            grid.innerHTML = "";

            for (let i = 0; i < numberOfCards; i++) {
                const skeleton =
                    document.createElement("div");

                skeleton.className = "skeleton-card";

                skeleton.setAttribute(
                    "aria-hidden",
                    "true"
                );

                skeleton.innerHTML = `
                    <div class="skeleton-image"></div>

                    <div class="skeleton-content">
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line small"></div>
                    </div>
                `;

                grid.appendChild(skeleton);
            }
        }

        function formatCollectionName(name) {
            return name
                .replaceAll("_", " ")
                .replaceAll("-", " ")
                .replace(/\s+/g, " ")
                .trim();
        }

        function createCollectionCard(
            base,
            collection
        ) {
            const card =
                document.createElement("a");

            card.className = "collection-card";

            card.href =
                `gallery.html?collection=${
                    encodeURIComponent(collection.name)
                }`;

            const imageContainer =
                document.createElement("div");

            imageContainer.className =
                "image-container";

            const image =
                document.createElement("img");

            image.className = "collection-image";

            image.alt =
                formatCollectionName(collection.name);

            image.loading = "lazy";
            image.decoding = "async";

            const normalizedBase =
                base.endsWith("/")
                    ? base
                    : `${base}/`;

            const encodedCollectionName =
                encodeURIComponent(collection.name);

            image.src =
                `${normalizedBase}${encodedCollectionName}` +
                `/title_thumbnail/collection_thumbnail.jpg`;

            image.addEventListener(
                "load",
                function () {
                    image.classList.add("loaded");
                }
            );

            image.addEventListener(
                "error",
                function () {
                    image.alt =
                        `${formatCollectionName(
                            collection.name
                        )} image unavailable`;
                }
            );

            const imageShade =
                document.createElement("div");

            imageShade.className = "image-shade";

            const imageCount =
                document.createElement("div");

            imageCount.className = "image-count";

            const photoCount =
                Number(collection.images) || 0;

            imageCount.textContent =
                `${photoCount} ${
                    photoCount === 1
                        ? "photo"
                        : "photos"
                }`;

            imageContainer.appendChild(image);
            imageContainer.appendChild(imageShade);
            imageContainer.appendChild(imageCount);

            const content =
                document.createElement("div");

            content.className =
                "collection-content";

            const textContainer =
                document.createElement("div");

            textContainer.className =
                "collection-text";

            const title =
                document.createElement("h2");

            title.className = "collection-title";

            title.textContent =
                formatCollectionName(
                    collection.name
                );

            const subtitle =
                document.createElement("p");

            subtitle.className =
                "collection-subtitle";

            subtitle.textContent =
                "View collection";

            const arrow =
                document.createElement("span");

            arrow.className = "card-arrow";
            arrow.textContent = "→";

            arrow.setAttribute(
                "aria-hidden",
                "true"
            );

            textContainer.appendChild(title);
            textContainer.appendChild(subtitle);

            content.appendChild(textContainer);
            content.appendChild(arrow);

            card.appendChild(imageContainer);
            card.appendChild(content);

            return card;
        }

        createSkeletonCards();

        fetch("collections.json")
            .then(response => {
                if (!response.ok) {
                    throw new Error(
                        `Unable to load collections.json: ${response.status}`
                    );
                }

                return response.json();
            })
            .then(data => {
                const base = data.base;
                const collections = data.collections;

                if (
                    !base ||
                    !Array.isArray(collections)
                ) {
                    throw new Error(
                        "collections.json is not in the expected format"
                    );
                }

                grid.innerHTML = "";

                grid.setAttribute(
                    "aria-busy",
                    "false"
                );

                if (collections.length === 0) {
                    status.textContent =
                        "No collections found.";

                    collectionSummary.textContent =
                        "";

                    return;
                }

                status.style.display = "none";

                collectionSummary.textContent =
                    `${collections.length} ${
                        collections.length === 1
                            ? "collection"
                            : "collections"
                    }`;

                collections.forEach(collection => {
                    grid.appendChild(
                        createCollectionCard(
                            base,
                            collection
                        )
                    );
                });
            })
            .catch(error => {
                grid.innerHTML = "";

                grid.setAttribute(
                    "aria-busy",
                    "false"
                );

                status.style.display = "block";
                status.classList.add("error");

                status.textContent =
                    "Unable to load the photography collections.";

                collectionSummary.textContent = "";

                console.error(error);
            });
    </script>
</body>
</html>
