<!DOCTYPE html>
<html>

<head>

<title>Collections</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

html, body {

    margin: 0;

    padding: 0;

    min-height: 100%;

    background: black;

    color: white;

    font-family: Arial, sans-serif;

}



nav {

    position: fixed;

    top: 15px;

    right: 20px;

    z-index: 20;

}



nav a {

    color: white;

    margin-left: 20px;

    text-decoration: none;

}



#title {

    text-align: center;

    padding-top: 70px;

    font-size: 30px;

}





#collections {

    display: grid;

    grid-template-columns: repeat(5, 1fr);

    gap: 30px;

    padding: 40px;

    max-width: 1600px;

    margin: auto;

}





.collection {

    text-align: center;

    color: white;

    text-decoration: none;

}





.collection img {

    width: 100%;

    aspect-ratio: 1 / 1;

    object-fit: cover;

    display: block;

    margin-bottom: 10px;

}





.collection:hover img {

    opacity: 0.8;

}





.name {

    font-size: 18px;

}






@media (max-width: 900px) {


    #collections {

        grid-template-columns: repeat(2, 1fr);

        gap: 15px;

        padding: 20px;

    }


    .name {

        font-size: 14px;

    }


}



</style>

</head>



<body>



<nav>

<a href="index.html">Home</a>

<a href="collections.html">Collections</a>

</nav>





<div id="title">

Collections

</div>





<div id="collections"></div>







<script>


const base =
"https://filedn.com/lbA2Vsf4s7Fj5KoVfXs5UL4/JM_Photos/";



fetch("collections.json")

.then(response => response.json())

.then(collections => {


const container =
document.getElementById("collections");



collections.forEach(collection => {



const link =
document.createElement("a");



link.className =
"collection";



link.href =
`gallery.html?collection=${collection.name}`;





const img =
document.createElement("img");



img.src =
`${base}${collection.name}/title_thumbnail/collection_thumbnail.jpg`;



img.onerror = function(){


    img.style.display = "none";


};





const name =
document.createElement("div");



name.className =
"name";



name.innerHTML =
collection.name;





link.appendChild(img);

link.appendChild(name);



container.appendChild(link);



});



})



.catch(error => {


document.getElementById("collections").innerHTML =
"Error loading collections.json";


console.error(error);


});



</script>



</body>

</html>
