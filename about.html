<!DOCTYPE html>
<html lang="en">
<head>
    <title>About</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="data/favicon.png">

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background: black;
            color: white;
            font-family: Arial, sans-serif;
        }

        #header {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 20;
            width: 100%;
            height: 86px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 28px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.82);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #logoLink {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }

        #logo {
            display: block;
            height: 50px;
            width: auto;
        }

        #navLinks {
            display: flex;
            align-items: center;
            gap: 26px;
        }

        #navLinks a {
            color: white;
            font-size: 16px;
            line-height: 1;
            text-decoration: none;
            letter-spacing: 0.02em;
            opacity: 0.82;
            transition: opacity 0.2s ease;
        }

        #navLinks a:hover,
        #navLinks a.active {
            opacity: 1;
        }

        #page {
            width: min(900px, calc(100% - 40px));
            margin: 0 auto;
            padding: 132px 0 70px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            margin: 0 0 34px;
            font-size: clamp(38px, 7vw, 72px);
            font-weight: 400;
            line-height: 0.95;
            letter-spacing: -0.05em;
        }

        #aboutImage {
            display: block;
            width: min(520px, 100%);
            height: auto;
            margin: 0 auto 36px;
            object-fit: cover;
        }

        #aboutText {
            width: min(720px, 100%);
            margin: 0 auto;
            font-size: 18px;
            line-height: 1.65;
            text-align: left;
            white-space: pre-wrap;
        }

        #aboutText.error {
            color: rgba(255, 255, 255, 0.68);
            font-style: italic;
            text-align: center;
        }

        #version {
            position: fixed;
            left: 20px;
            bottom: 16px;
            z-index: 30;
            color: red;
            font-size: 12px;
            opacity: 0.8;
            pointer-events: none;
        }

        @media (max-width: 640px) {
            #header {
                height: 74px;
                padding: 15px 18px;
            }

            #logo {
                height: 42px;
            }

            #navLinks {
                gap: 16px;
            }

            #navLinks a {
                font-size: 14px;
            }

            #page {
                width: min(620px, calc(100% - 34px));
                padding-top: 112px;
            }

            h1 {
                margin-bottom: 28px;
            }

            #aboutImage {
                margin-bottom: 30px;
            }

            #aboutText {
                font-size: 16px;
                line-height: 1.6;
            }
        }
    </style>
</head>

<body>
    <header id="header">
        <a id="logoLink" href="index.html" aria-label="Home">
            <img id="logo" src="data/logo.png" alt="JM Photography logo">
        </a>

        <nav id="navLinks" aria-label="Main navigation">
            <a href="index.html">Home</a>
            <a href="collections.html">Collections</a>
            <a class="active" href="about.html">About</a>
        </nav>
    </header>

    <main id="page">
        <h1>About</h1>

        <img
            id="aboutImage"
            src="data/about.jpg"
            alt="About photograph"
        >

        <div id="aboutText">Loading...</div>
    </main>

    <div id="version">v1.0.7</div>

    <script>
        const version = "v1.0.7";
        document.getElementById("version").textContent = version;

        fetch("data/about.txt")
            .then(response => {
                if (!response.ok) {
                    throw new Error(
                        `Unable to load about.txt: ${response.status}`
                    );
                }

                return response.text();
            })
            .then(text => {
                const aboutText =
                    document.getElementById("aboutText");

                aboutText.textContent = text.trim();
            })
            .catch(error => {
                const aboutText =
                    document.getElementById("aboutText");

                aboutText.textContent =
                    "Unable to load about text.";

                aboutText.classList.add("error");

                console.error(error);
            });
    </script>
</body>
</html>
