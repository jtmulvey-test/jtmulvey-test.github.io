<!DOCTYPE html>
<html lang="en">
<head>
    <title>About | JM Photography</title>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <link rel="icon" type="image/png" href="data/favicon.png">

    <style>
        :root {
            --page-background: #000000;
            --primary-text: #ffffff;
            --secondary-text: rgba(255, 255, 255, 0.72);
            --page-width: 820px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
            margin: 0;
            background: var(--page-background);
            color: var(--primary-text);
            font-family:
                Arial,
                Helvetica,
                sans-serif;
        }

        a {
            color: inherit;
        }

        #topLeftLogo {
            position: fixed;
            top: 15px;
            left: 20px;
            z-index: 50;
            display: block;
            height: 87px;
            text-decoration: none;
        }

        #topLeftLogo img {
            display: block;
            width: auto;
            height: 100%;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
            transition:
                opacity 0.2s ease,
                transform 0.25s ease;
        }

        #topLeftLogo:hover img {
            opacity: 0.75;
            transform: scale(1.025);
        }

        #topLeftLogo:focus-visible {
            outline: 1px solid white;
            outline-offset: 5px;
        }

        #version {
            position: fixed;
            top: 107px;
            left: 20px;
            z-index: 50;
            color: red;
            font-size: 12px;
            line-height: 1;
            opacity: 0.85;
        }

        nav {
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        nav a {
            color: white;
            font-size: 22.4px;
            line-height: 1.1;
            text-decoration: none;
            transition:
                opacity 0.2s ease,
                transform 0.2s ease;
        }

        nav a:hover {
            opacity: 0.65;
            transform: translateX(-3px);
        }

        nav a:focus-visible {
            outline: 1px solid white;
            outline-offset: 5px;
            border-radius: 2px;
        }

        #page {
            width: min(
                var(--page-width),
                calc(100% - 48px)
            );
            min-height: 100vh;
            margin: 0 auto;
            padding: 135px 0 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 {
            margin: 0 0 42px;
            font-size: clamp(42px, 7vw, 82px);
            font-weight: 500;
            line-height: 0.95;
            letter-spacing: -0.045em;
        }

        #aboutPhoto {
            display: block;
            width: min(520px, 100%);
            height: auto;
            max-height: 68vh;
            object-fit: contain;
            margin: 0 auto;
            border-radius: 2px;
        }

        #aboutText {
            width: min(680px, 100%);
            margin: 34px auto 0;
            color: var(--secondary-text);
            font-size: 18px;
            line-height: 1.75;
            white-space: pre-line;
        }

        #status {
            margin-top: 34px;
            color: var(--secondary-text);
            font-size: 16px;
            line-height: 1.6;
        }

        #status.error {
            color: #ff6b6b;
        }

        @media (max-width: 820px) {
            #topLeftLogo {
                height: 70px;
            }

            #version {
                top: 90px;
            }

            #page {
                padding-top: 150px;
            }
        }

        @media (max-width: 520px) {
            #topLeftLogo {
                top: 14px;
                left: 14px;
                height: 56px;
            }

            #version {
                top: 75px;
                left: 14px;
            }

            nav {
                right: 14px;
            }

            nav a {
                font-size: 18px;
            }

            #page {
                width: calc(100% - 28px);
                padding-top: 150px;
            }

            h1 {
                margin-bottom: 32px;
                font-size: 42px;
            }

            #aboutText {
                margin-top: 28px;
                font-size: 16px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <a
        id="topLeftLogo"
        href="index.html"
        aria-label="JM Photography home"
    >
        <img
            src="data/logo.png"
            alt="JM Photography"
        >
    </a>

    <div id="version">v1.0.8</div>

    <nav aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="collections.html">Collections</a>
        <a href="about.html">About</a>
    </nav>

    <main id="page">
        <h1>About</h1>

        <img
            id="aboutPhoto"
            src=""
            alt="About Justin"
        >

        <div id="status">Loading about page...</div>

        <div id="aboutText"></div>
    </main>

    <script>
        const aboutPhoto =
            document.getElementById("aboutPhoto");

        const aboutText =
            document.getElementById("aboutText");

        const status =
            document.getElementById("status");

        function normalizeBase(base) {
            return base.endsWith("/")
                ? base
                : `${base}/`;
        }

        function cleanAboutText(text) {
            return text
                .replace(/\r\n/g, "\n")
                .replace(/\n{3,}/g, "\n\n")
                .trim();
        }

        fetch("data/collections.json")
            .then(response => {
                if (!response.ok) {
                    throw new Error(
                        `Unable to load collections.json: ${response.status}`
                    );
                }

                return response.json();
            })
            .then(data => {
                const base = normalizeBase(data.base);

                aboutPhoto.src =
                    "data/about.jpg";

                return fetch("data/about.txt");
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(
                        `Unable to load about.txt: ${response.status}`
                    );
                }

                return response.text();
            })
            .then(text => {
                status.style.display = "none";

                aboutText.textContent =
                    cleanAboutText(text);
            })
            .catch(error => {
                status.classList.add("error");

                status.textContent =
                    "Unable to load the about text.";

                console.error(error);
            });
    </script>
</body>
</html>
