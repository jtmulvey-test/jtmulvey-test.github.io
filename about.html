<!DOCTYPE html>
<html lang="en">
<head>
    <title>About</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="data/favicon.png">

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background: black;
            color: white;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
        }

        #page {
            width: min(900px, calc(100% - 40px));
            padding: 34px 0 70px;
            box-sizing: border-box;
        }

        #topBar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 42px;
        }

        #backLink {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            color: white;
            font-size: 22.4px;
            line-height: 1.1;
            text-decoration: none;
            transition:
                opacity 0.2s ease,
                transform 0.2s ease;
        }

        #backLink:hover {
            opacity: 0.65;
            transform: translateX(3px);
        }

        #backLink:focus-visible {
            outline: 1px solid white;
            outline-offset: 5px;
            border-radius: 2px;
        }

        #backSymbol {
            display: inline-block;
            font-size: 21px;
            transform: translateY(-1px);
        }

        #version {
            color: red;
            font-size: 12px;
            opacity: 0.8;
            white-space: nowrap;
        }

        #content {
            display: grid;
            grid-template-columns: minmax(220px, 340px) 1fr;
            gap: 42px;
            align-items: start;
        }

        #aboutImage {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 2px;
            object-fit: cover;
        }

        #textColumn h1 {
            margin: 0 0 22px;
            font-size: clamp(34px, 6vw, 60px);
            font-weight: 400;
            letter-spacing: -0.04em;
        }

        #aboutText {
            font-size: 18px;
            line-height: 1.65;
            white-space: pre-wrap;
        }

        #aboutText p:first-child {
            margin-top: 0;
        }

        #aboutText p:last-child {
            margin-bottom: 0;
        }

        #aboutText.error {
            color: rgba(255, 255, 255, 0.68);
            font-style: italic;
        }

        @media (max-width: 760px) {
            #page {
                width: min(620px, calc(100% - 34px));
                padding-top: 24px;
            }

            #topBar {
                margin-bottom: 32px;
            }

            #content {
                grid-template-columns: 1fr;
                gap: 28px;
            }

            #aboutImage {
                max-width: 420px;
            }

            #aboutText {
                font-size: 16px;
                line-height: 1.6;
            }
        }
    </style>
</head>

<body>
    <main id="page">
        <div id="topBar">
            <a
                id="backLink"
                href="index.html"
                aria-label="Back to home"
            >
                <span id="backSymbol" aria-hidden="true">&lt;</span>
                <span>Back</span>
            </a>

            <div id="version">v1.0.6</div>
        </div>

        <section id="content" aria-labelledby="pageTitle">
            <img
                id="aboutImage"
                src="data/about.jpg"
                alt="About photograph"
            >

            <div id="textColumn">
                <h1 id="pageTitle">About</h1>
                <div id="aboutText">Loading...</div>
            </div>
        </section>
    </main>

    <script>
        const version = "v1.0.6";
        document.getElementById("version").textContent = version;

        fetch("data/about.txt")
            .then(response => {
                if (!response.ok) {
                    throw new Error(
                        `Unable to load about.txt: ${response.status}`
                    );
                }

                return response.text();
            })
            .then(text => {
                const aboutText =
                    document.getElementById("aboutText");

                aboutText.textContent = text.trim();
            })
            .catch(error => {
                const aboutText =
                    document.getElementById("aboutText");

                aboutText.textContent =
                    "Unable to load about text.";

                aboutText.classList.add("error");

                console.error(error);
            });
    </script>
</body>
</html>
